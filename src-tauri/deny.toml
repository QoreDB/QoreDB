# SPDX-License-Identifier: Apache-2.0
# cargo-deny configuration for QoreDB supply chain security
# https://embarkstudios.github.io/cargo-deny/

[advisories]
# Don't fail on unmaintained crates — they're informational, not security issues.
# cargo audit already warns about them separately.
unmaintained = "none"
ignore = [
  # rsa Marvin Attack: sqlx-mysql uses rsa for MySQL caching_sha2_password auth.
  # No fix available in rsa 0.9.x. Timing side-channel not exploitable in DB auth context.
  { id = "RUSTSEC-2023-0071", reason = "sqlx-mysql transitive dep, no fix available" },
]

[licenses]
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "Unicode-DFS-2016",
  "Zlib",
  "BSL-1.0",
  "CC0-1.0",
  "OpenSSL",
  "MPL-2.0",
  "CDLA-Permissive-2.0",
]
exceptions = []
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
