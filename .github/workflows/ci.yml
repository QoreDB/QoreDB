name: Backend Tests

on:
  pull_request:

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # sccache via GitHub Actions Cache backend — see PERFORMANCE_PLAN §2.3.
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
      CARGO_INCREMENTAL: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            dbus-x11 \
            gnome-keyring \
            pkg-config \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libkrb5-dev

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit frontend dependencies
        run: pnpm audit --audit-level=high
        continue-on-error: true

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Audit Rust dependencies
        run: cd src-tauri && cargo audit

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: Check licenses and advisories
        run: cd src-tauri && cargo deny check

      - name: Start database containers
        run: docker compose up -d postgres mysql mongodb

      - name: Wait for databases
        run: |
          set -e
          wait_for() {
            local name="$1"
            shift
            for _ in $(seq 1 30); do
              if "$@"; then
                echo "$name ready"
                return 0
              fi
              sleep 1
            done
            echo "$name failed to start"
            return 1
          }

          wait_for postgres docker compose exec -T postgres pg_isready -U qoredb -d testdb
          wait_for mysql docker compose exec -T mysql mysqladmin ping -uroot -proot_test --silent
          wait_for mongodb docker compose exec -T mongodb mongosh -u qoredb -p qoredb_test --authenticationDatabase admin --quiet --eval "db.runCommand({ ping: 1 })"

      - name: Run backend tests
        env:
          RUST_TEST_THREADS: 1
          PUBLIC_KEY_BASE64: ${{ vars.PUBLIC_KEY_BASE64 }}
        run: |
          dbus-run-session -- bash -c "cd src-tauri && cargo test"

      - name: Shutdown containers
        if: always()
        run: docker compose down -v
