# cargo-audit configuration
# See: https://github.com/rustsec/rustsec/tree/main/cargo-audit

[advisories]
ignore = [
    # rsa 0.9.10 - Marvin Attack timing sidechannel (no fix available)
    # Transitive dep via sqlx-mysql. Awaiting upstream fix.
    "RUSTSEC-2023-0071",

    # atk / atk-sys - GTK3 bindings unmaintained
    # Transitive deps via tauri (Linux only). No alternative until tauri migrates to GTK4.
    "RUSTSEC-2024-0413",
    "RUSTSEC-2024-0416",

    # libyml - unsound and unmaintained
    # Transitive dep via serde_yml (used in pro/contracts feature).
    # No actively maintained drop-in replacement available.
    "RUSTSEC-2025-0067",

    # serde_yml - unsound and unmaintained
    # Used in pro/contracts feature for YAML parsing. serde_yaml is also unmaintained.
    # Migration to an alternative (e.g. serde_yaml_ng) tracked separately.
    "RUSTSEC-2025-0068",

    # rand 0.7.3 - unsound only with a custom logger calling rand::rng()
    # Transitive via tiberius (MSSQL driver) and tauri (phf_generator).
    # QoreDB defines no such logger; not exploitable in our context.
    "RUSTSEC-2026-0097",

    # hickory-proto 0.25.2 - NSEC3 closest-encloser proof unbounded loop (DoS in DNSSEC validation).
    # Transitive via mongodb 3.4.1 (SRV record resolution). No fixed upgrade available upstream.
    # QoreDB only resolves DNS for user-provided mongodb URIs; not reachable from untrusted DNS.
    "RUSTSEC-2026-0118",

    # hickory-proto 0.25.2 - O(n²) name compression CPU exhaustion during message encoding.
    # Fix in hickory-proto 0.26.1, but mongodb 3.4.1 pins 0.25.x. Awaiting mongodb upstream bump.
    # Only triggered when encoding attacker-controlled DNS names; not applicable to client-side MongoDB usage.
    "RUSTSEC-2026-0119",
]
