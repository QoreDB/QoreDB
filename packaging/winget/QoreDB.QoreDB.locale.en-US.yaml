ShortDescription: Modern, local-first database client for SQL and NoSQL.
Description: |
  QoreDB is a fast, open-source database client built with Rust and Tauri.
  It supports PostgreSQL, MySQL, MariaDB, SQL Server, SQLite, DuckDB,
  CockroachDB, MongoDB, Redis, and more — through a single unified interface.
  Designed for developers who want a calm, precise, trustworthy daily-driver
  alternative to DBeaver and pgAdmin. Local-first: data stays on your machine.
