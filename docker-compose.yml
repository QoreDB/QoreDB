services:
  ssh-bastion:
    image: lscr.io/linuxserver/openssh-server:latest
    container_name: qoredb-ssh-bastion
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - USER_NAME=qoredb
      - PUBLIC_KEY_FILE=/config/ssh/authorized_keys
    ports:
      - '2222:2222'
    volumes:
      - ./dev/ssh:/config/ssh:ro
      - ./dev/ssh/sshd_config.d/10-qoredb-forwarding.conf:/config/sshd/sshd_config.d/10-qoredb-forwarding.conf:ro

  postgres:
    image: postgres:16-alpine
    container_name: qoredb-postgres
    environment:
      POSTGRES_USER: qoredb
      POSTGRES_PASSWORD: qoredb_test
      POSTGRES_DB: testdb
    ports:
      - '54321:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mysql:
    image: mysql:8
    container_name: qoredb-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_test
      MYSQL_USER: qoredb
      MYSQL_PASSWORD: qoredb_test
      MYSQL_DATABASE: testdb
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql

  mongodb:
    image: mongo:7
    container_name: qoredb-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: qoredb
      MONGO_INITDB_ROOT_PASSWORD: qoredb_test
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: qoredb-redis
    command: redis-server --requirepass qoredb_test
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: qoredb-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "QoreDB_Test123!"
    ports:
      - '1433:1433'
    volumes:
      - sqlserver_data:/var/opt/mssql

  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    container_name: qoredb-clickhouse
    environment:
      CLICKHOUSE_USER: qoredb
      # No password: integration tests run over cleartext HTTP and the driver
      # refuses Basic-auth in cleartext (audit B4-C8). TLS isn't worth wiring
      # up for a local test container.
      CLICKHOUSE_PASSWORD: ""
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
      CLICKHOUSE_DB: testdb
    ports:
      - '8123:8123' # HTTP
      - '9000:9000' # native (unused by QoreDB but exposed for tooling)
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - clickhouse_data:/var/lib/clickhouse

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: qoredb-elasticsearch
    environment:
      discovery.type: single-node
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
      # Security disabled so integration tests connect over cleartext HTTP with
      # auth_mode=none (the driver refuses Basic/ApiKey over cleartext). Enable
      # xpack.security + TLS when testing the basic/api_key auth paths.
      xpack.security.enabled: "false"
    ports:
      - '9200:9200' # REST API
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data

  opensearch:
    image: opensearchproject/opensearch:2.13.0
    container_name: qoredb-opensearch
    environment:
      discovery.type: single-node
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
      # Same rationale as Elasticsearch: plugin disabled → plain HTTP for tests.
      DISABLE_SECURITY_PLUGIN: "true"
      DISABLE_INSTALL_DEMO_CONFIG: "true"
    ports:
      - '9201:9200' # REST API (9201 on host to avoid clashing with Elasticsearch)
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - opensearch_data:/usr/share/opensearch/data

volumes:
  postgres_data:
  mysql_data:
  mongo_data:
  redis_data:
  sqlserver_data:
  clickhouse_data:
  elasticsearch_data:
  opensearch_data:
